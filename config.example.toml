# eleven-barrage-grab 配置模板
#
# 复制此文件为 config.toml 或 config.local.toml 后填入真实值
# 不要把含有真实 ttwid/sessionid 的文件提交到 git。
#
# 优先级：CLI flags > 环境变量 > 配置文件

[service]
# 抖音直播间 web_room_id（如 "741891423654"）
room_id = "741891423654"

# WS / gRPC / metrics 监听地址
ws_listen_addr = "0.0.0.0:8888"
grpc_listen_addr = "0.0.0.0:50051"
metrics_listen_addr = "0.0.0.0:9090"

[wss]
# 空字符串表示走 auto-sign（由浏览器/CDP 自动签名）
url = ""
heartbeat_interval_secs = 5

[events]
# 允许推送的事件 method（MVP 默认仅 Chat/Gift/Like）
push_event_methods = [
    "WebcastChatMessage",
    "WebcastGiftMessage",
    "WebcastLikeMessage",
]

[room_api]
# 抖音登录态 Cookie（可选）
cookie = ""
# 是否在启动时调用 room info API
enabled = false

# 关键：从浏览器 DevTools 复制登录态 cookie 填入
# Linux 无 GUI 环境：由外部注入，不继承已登录浏览器 profile
[auth]
ttwid = ""
sessionid = ""

[logging]
level = "info"
json_format = false

[browser]
# Windows 默认路径示例：
# edge_path = "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"
# Linux 无 GUI 环境示例（需先安装 headless Chromium/Edge）：
edge_path = "/usr/bin/chromium"

pool_size = 3
max_concurrent_per_browser = 2
sign_timeout_secs = 15
health_check_interval_secs = 30
user_data_dir_template = "./data/browser-{id}"
extra_args = []
cdp_port_base = 9222

[rest]
listen_addr = "0.0.0.0:7878"

[signer]
mode = "browser"
