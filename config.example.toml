# eleven-barrage-grab 配置示例
#
# 复制此文件为 config.toml 并根据实际情况修改
# 优先级：CLI flags > 环境变量 > 配置文件

[service]
# 抖音直播间 web_room_id（如 "741891423654"）
room_id = "741891423654"

# WS 服务端监听地址（下游消费者接入）
ws_listen_addr = "0.0.0.0:8888"

# gRPC 服务端监听地址
grpc_listen_addr = "0.0.0.0:50051"

# Prometheus metrics 端点
metrics_listen_addr = "0.0.0.0:9090"

[wss]
# 上游 wss URL（空 → 必须由 collector 提供，参考 R-011/R-012）
url = ""

# 必需的 HTTP headers（如 Cookie、签名等）
# 如果空，service 启动时会等待 collector 提供 SignedWssMaterial
# MVP 阶段可以通过 --wss-url + --cookie CLI flag 临时注入
[room_api]
# 抖音登录态 Cookie（可选，用于访问私密房间）
cookie = ""

# 是否在启动时调用 room info API（用于获取 room_id_str）
enabled = true

# Auto-sign mode cookie (auto-sign-fetcher R-002)
# 从浏览器 DevTools → Application → Cookies 复制：
#   - ttwid: 必填，至少填一个
#   - sessionid: 可选
[auth]
ttwid = "your_ttwid_here"
sessionid = ""  # optional

[events]
# 允许推送的事件 method（MVP 默认仅 Chat/Gift/Like）
push_event_methods = [
    "WebcastChatMessage",
    "WebcastGiftMessage",
    "WebcastLikeMessage",
]

[mitm]
# 启用 MITM 兜底模式（参考原项目 TitaniumProxy）
# MVP 阶段仅占位接口，未实现
fallback_enabled = false
proxy_port = 8827

[logging]
# 日志级别：trace / debug / info / warn / error
level = "info"

# 是否使用 JSON 格式（生产推荐）
json_format = false

# Browser-based signer config (auto-signer)
[browser]
# Edge path (Windows default; Linux/Mac auto-detect in v2)
edge_path = "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"

# Pool size: number of Edge processes
pool_size = 3

# Concurrent sign requests per browser
max_concurrent_per_browser = 2

# Timeout for capturing WSS request after navigation
sign_timeout_secs = 10

# Health check interval (browser alive check)
health_check_interval_secs = 30

# User data directory template ({id} substituted with browser index)
user_data_dir_template = "./data/browser-{id}"

# Extra Edge args (anti-detection)
extra_args = [
    "--headless=new",
    "--disable-blink-features=AutomationControlled",
    "--no-first-run",
    "--no-default-browser-check",
    "--window-size=1920,1080",
]

# CDP port base (each browser gets port_base + id)
cdp_port_base = 9222

# REST API config
[rest]
listen_addr = "0.0.0.0:7878"

# Signer mode (reserved; only "browser" is currently supported)
[signer]
mode = "browser"