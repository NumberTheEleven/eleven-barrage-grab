syntax = "proto3";

package barrage.v1;

// Response: 解压 WssResponse.payload 后得到的内层消息容器
// 来源：原 DouyinBarrageGrab/BarrageGrab/proto/message.proto
message Response {
  repeated Message messages = 1;
  string cursor = 2;
  int64 fetch_interval = 3;
  int64 now = 4;
  string internal_ext = 5;
  int32 fetch_type = 6;
  map<string, string> route_params = 7;
  int64 heartbeat_duration = 8;
  bool need_ack = 9;
  string push_server = 10;
  string live_cursor = 11;
  bool history_no_more = 12;
}

// Message: 单条弹幕消息的容器
// 按 msg.method 字段路由到具体消息类型
message Message {
  string method = 1;
  bytes payload = 2;
  int64 msg_id = 3;
  int32 msg_type = 4;
  int64 offset = 5;
}

// 8 种消息类型（MVP 推送 Chat/Gift/Like 三种，其余保留 schema 但不推送）

message ChatMessage {
  Common common = 1;
  User user = 2;
  string content = 3;
  bool visible_to_sender = 4;
  Image background_image = 5;
  string full_screen_text_color = 6;
  Image background_image_v2 = 7;
  PublicAreaCommon public_area_common = 9;
  Image gift_image = 10;
}

message GiftMessage {
  Common common = 1;
  int64 gift_id = 2;
  int64 fan_ticket_count = 3;
  int64 group_count = 4;
  int64 repeat_count = 5;
  int64 combo_count = 6;
  User user = 7;
  User to_user = 8;
  int32 repeat_end = 9;
  int64 group_id = 10;
  int64 room_fan_ticket_count = 11;
  int64 send_type = 12;
  string log_id = 13;
  GiftStruct gift = 14;
  PublicAreaCommon public_area_common = 15;
  int64 banned_display_effects = 16;
  GiftTrayInfo tray_info = 17;
}

message LikeMessage {
  Common common = 1;
  int64 count = 2;
  int64 total = 3;
  int64 color = 4;
  User user = 5;
  string icon = 6;
}

message SocialMessage {
  Common common = 1;
  User user = 2;
  int64 share_type = 3;
  int64 action = 4;
  string share_target = 5;
  int64 follow_count = 6;
  PublicAreaCommon public_area_common = 7;
}

message MemberMessage {
  Common common = 1;
  User user = 2;
  int64 member_count = 3;
  bool is_set_to_admin = 4;
  bool is_top_user = 5;
  int64 rank_score = 6;
  int64 top_user_no = 7;
  int64 enter_type = 8;
  int64 action = 9;
  string action_description = 10;
  int64 user_id = 11;
  string pop_str = 12;
  string user_enter_tip_type = 13;
  string anchor_enter_tip_type = 14;
}

message ControlMessage {
  Common common = 1;
  int32 status = 2;
}

message RoomUserSeqMessage {
  Common common = 1;
  repeated Contributor ranks = 2;
  int64 total = 3;
  string pop_str = 4;
  repeated Contributor seats = 5;
  int64 popularity = 6;
  int64 total_user = 7;
  string total_user_str = 8;
  string total_str = 9;
  string online_user_for_anchor = 10;
  string total_pv_for_anchor = 11;

  message Contributor {
    int64 score = 1;
    User user = 2;
    int64 rank = 3;
    int64 delta = 4;
    bool is_hidden = 5;
    string score_description = 6;
    string exactly_score = 7;
  }
}

message FansclubMessage {
  Common common_info = 1;
  // type: 升级是1，加入是2
  int32 type = 2;
  string content = 3;
  User user = 4;
}

// 共用类型

message Common {
  string method = 1;
  int64 msg_id = 2;
  int64 room_id = 3;
  int64 create_time = 4;
  int32 monitor = 5;
  bool is_show_msg = 6;
  string describe = 7;
  Text display_text = 8;
  int64 fold_type = 9;
  int64 anchor_fold_type = 10;
  int64 priority_score = 11;
  string log_id = 12;
  string msg_process_filter_k = 13;
  string msg_process_filter_v = 14;
  User user = 15;
  Room room = 16;
  int64 anchor_fold_type_v2 = 17;
  int64 app_id = 24;
}

message User {
  int64 id = 1;
  int64 short_id = 2;
  string nickname = 3;
  int32 gender = 4;
  string signature = 5;
  int32 level = 6;
  int64 birthday = 7;
  Image avatar_thumb = 8;
  Image avatar_medium = 9;
  Image avatar_large = 10;
  bool verified = 11;
  int32 experience = 12;
  string city = 13;
  string sec_uid = 14;
  int32 user_role = 15;
  FollowInfo follow_info = 16;
  PayGrade pay_grade = 17;
}

message Image {
  repeated string url_list = 1;
  string uri = 2;
  int64 height = 3;
  int64 width = 4;
  string avg_color = 5;
  int32 image_type = 6;
  string open_web_url = 7;
}

message FollowInfo {
  int64 following_count = 1;
  int64 follower_count = 2;
  int64 follow_status = 3;
  int64 push_status = 4;
  string remark_name = 5;
}

message PayGrade {
  string name = 1;
  int64 level = 2;
  string next_name = 3;
  int64 next_diamond = 4;
  int64 now_diamond = 5;
}

message GiftStruct {
  int64 id = 1;
  string name = 2;
  string describe = 3;
  int32 diamond_count = 4;
  bool notify = 5;
  int64 duration = 6;
  bool combo = 7;
  int32 type = 8;
  Image image = 9;
  Image icon = 10;
  bool is_locked = 11;
}

message GiftTrayInfo {
  int64 tray_level = 1;
}

message PublicAreaCommon {
  Image user_label = 1;
  int64 user_consume_in_room = 2;
  int64 user_send_gift_cnt_in_room = 3;
}

message Text {
  string key = 1;
  string default_pattern = 2;
  TextFormat default_format = 3;
  repeated TextPiece pieces = 4;
}

message TextFormat {
  string color = 1;
  bool bold = 2;
  bool italic = 3;
  int32 weight = 4;
  int32 italic_angle = 5;
  int32 font_size = 6;
  bool user_height_light_color = 7;
  bool use_remote_color = 8;
}

message TextPiece {
  int32 type = 1;
  TextFormat format = 2;
  string string_value = 11;
  TextPieceUser user_value = 21;
}

message TextPieceUser {
  User user = 1;
  bool with_colon = 2;
}

message Room {
  int64 id = 1;
  string id_str = 2;
  int64 status = 3;
  int64 owner_user_id = 4;
  string title = 5;
  int64 user_count = 6;
  int64 create_time = 7;
  int64 linkmic_layout = 8;
  int64 finish_time = 9;
  RoomExtra extra = 10;
  string dynamic_cover_uri = 11;
  map<int64, string> dynamic_cover_dict = 12;
  int64 last_ping_time = 13;
  int64 live_id = 14;
  int64 stream_provider = 15;
  int64 os_type = 16;
  int64 client_version = 17;
  bool with_linkmic = 18;
  bool enable_room_perspective = 19;
  Image cover = 20;
  Image dynamic_cover = 21;
  Image dynamic_cover_low = 22;
  string share_url = 23;
  string anchor_share_text = 24;
  string user_share_text = 25;
  int64 stream_id = 26;
  string stream_id_str = 27;
  StreamUrl stream_url = 28;
  int64 mosaic_status = 29;
  string mosaic_tip = 30;
  int64 cell_style = 31;
  LinkMic link_mic = 32;
  int64 luckymoney_num = 33;
  repeated Decoration deco_list = 34;
  repeated TopFan top_fans = 35;
  RoomStats stats = 36;
  string sun_daily_icon_content = 37;
  string distance = 38;
  string distance_city = 39;
  string location = 40;
  string real_distance = 41;
  Image feed_room_label = 42;
  string common_label_list = 43;
  RoomUserAttr living_room_attrs = 44;
  repeated int64 admin_user_ids = 45;
  User owner = 46;
  string private_info = 47;
}

message RoomExtra {}
message RoomStats {}
message RoomUserAttr {}
message StreamUrl {}
message LinkMic {}
message Decoration {}
message TopFan {}
