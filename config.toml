# 示例配置：复制为 config.local.toml 并填入真实值后运行
# 不要把含有真实 ttwid/sessionid 的文件提交到 git。
[service]
room_id = "664637748606"

# WS / gRPC / metrics 监听地址
ws_listen_addr = "0.0.0.0:8888"
grpc_listen_addr = "0.0.0.0:50051"
metrics_listen_addr = "0.0.0.0:9090"

[wss]
# 走 auto-sign 路径时，wss.url 留空
url = ""
heartbeat_interval_secs = 5

[events]
push_event_methods = [
    "WebcastChatMessage",
    "WebcastGiftMessage",
    "WebcastLikeMessage",
]

[room_api]
cookie = ""
enabled = false

# auth cookie 必须至少提供一个；推荐从浏览器 DevTools 复制
[auth]
ttwid = ""
sessionid = ""

[logging]
level = "info"
json_format = false
